apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: default
  labels:
    app: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: halei-acr-new-registry.eu-central-1.cr.aliyuncs.com/test/him-auth:${VERSION}
          ports:
            - containerPort: 8100
              name: http
            - containerPort: 9100
              name: grpc
          env:
            - name: LOG_LEVEL
              value: info
          livenessProbe:
            httpGet:
              path: /ping
              port: 8100
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: 8100
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
