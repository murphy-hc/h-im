apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatroom
  namespace: default
  labels:
    app: chatroom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatroom
  template:
    metadata:
      labels:
        app: chatroom
    spec:
      containers:
        - name: chatroom
          image: halei-acr-new-registry.eu-central-1.cr.aliyuncs.com/test/him-chatroom:${VERSION}
          ports:
            - containerPort: 8105
              name: http
            - containerPort: 9105
              name: grpc
          env:
            - name: LOG_LEVEL
              value: info
          livenessProbe:
            httpGet:
              path: /ping
              port: 8105
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: 8105
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
