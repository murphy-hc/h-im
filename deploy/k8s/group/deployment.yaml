apiVersion: apps/v1
kind: Deployment
metadata:
  name: group
  namespace: default
  labels:
    app: group
spec:
  replicas: 1
  selector:
    matchLabels:
      app: group
  template:
    metadata:
      labels:
        app: group
    spec:
      containers:
        - name: group
          image: halei-acr-new-registry.eu-central-1.cr.aliyuncs.com/test/him-group:${VERSION}
          ports:
            - containerPort: 8104
              name: http
            - containerPort: 9104
              name: grpc
          env:
            - name: LOG_LEVEL
              value: info
          livenessProbe:
            httpGet:
              path: /ping
              port: 8104
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: 8104
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
