apiVersion: apps/v1
kind: Deployment
metadata:
  name: media
  namespace: default
  labels:
    app: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: media
  template:
    metadata:
      labels:
        app: media
    spec:
      containers:
        - name: media
          image: halei-acr-new-registry.eu-central-1.cr.aliyuncs.com/test/him-media:${VERSION}
          ports:
            - containerPort: 8107
              name: http
            - containerPort: 9107
              name: grpc
          env:
            - name: LOG_LEVEL
              value: info
          livenessProbe:
            httpGet:
              path: /ping
              port: 8107
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: 8107
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
