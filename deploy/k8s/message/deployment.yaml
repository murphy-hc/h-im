apiVersion: apps/v1
kind: Deployment
metadata:
  name: message
  namespace: default
  labels:
    app: message
spec:
  replicas: 1
  selector:
    matchLabels:
      app: message
  template:
    metadata:
      labels:
        app: message
    spec:
      containers:
        - name: message
          image: halei-acr-new-registry.eu-central-1.cr.aliyuncs.com/test/him-message:${VERSION}
          ports:
            - containerPort: 8102
              name: http
            - containerPort: 9102
              name: grpc
          env:
            - name: LOG_LEVEL
              value: info
          livenessProbe:
            httpGet:
              path: /ping
              port: 8102
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: 8102
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
