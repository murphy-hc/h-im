apiVersion: apps/v1
kind: Deployment
metadata:
  name: push
  namespace: default
  labels:
    app: push
spec:
  replicas: 1
  selector:
    matchLabels:
      app: push
  template:
    metadata:
      labels:
        app: push
    spec:
      containers:
        - name: push
          image: halei-acr-new-registry.eu-central-1.cr.aliyuncs.com/test/him-push:${VERSION}
          ports:
            - containerPort: 8106
              name: http
            - containerPort: 9106
              name: grpc
          env:
            - name: LOG_LEVEL
              value: info
          livenessProbe:
            httpGet:
              path: /ping
              port: 8106
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: 8106
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
