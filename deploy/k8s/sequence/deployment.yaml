apiVersion: apps/v1
kind: Deployment
metadata:
  name: sequence
  namespace: default
  labels:
    app: sequence
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sequence
  template:
    metadata:
      labels:
        app: sequence
    spec:
      containers:
        - name: sequence
          image: halei-acr-new-registry.eu-central-1.cr.aliyuncs.com/test/him-sequence:${VERSION}
          ports:
            - containerPort: 8108
              name: http
            - containerPort: 9108
              name: grpc
          env:
            - name: LOG_LEVEL
              value: info
          livenessProbe:
            httpGet:
              path: /ping
              port: 8108
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: 8108
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
