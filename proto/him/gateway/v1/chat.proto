syntax = "proto3";
package him.gateway.v1;
option go_package = "github.com/murphy-hc/h-im/gen/go/him/gateway/v1;gatewayv1";

message ChatMessage {
  string message_id = 1;
  string sender_id  = 2;
  string content    = 3;
  int64  timestamp  = 4;
  string reply_to   = 5;
  int32  msg_type   = 6;  // text/image/voice/video/file
}

message ChatAck {
  string message_id = 1;
  string user_id    = 2;
  int64  timestamp  = 3;
}
