syntax = "proto3";
package him.gateway.v1;
option go_package = "github.com/murphy-hc/h-im/gen/go/him/gateway/v1;gatewayv1";

message ChatroomMessage {
  string message_id = 1;
  string room_id    = 2;
  string sender_id  = 3;
  string content    = 4;
  int64  timestamp  = 5;
  int32  priority   = 6;
}

message ChatroomAck {
  string message_id = 1;
  string user_id    = 2;
  int64  timestamp  = 3;
}
