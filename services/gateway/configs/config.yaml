server:
  env: "dev"
  ws:
    network: "tcp"
    addr: ":8080"
    read_timeout: "10s"
    write_timeout: "10s"
    read_buffer_size: 4096
    write_buffer_size: 4096
    handshake_timeout: "10s"
    enable_compression: true
  http:
    network: "tcp"
    addr: ":8180"
  grpc:
    network: "tcp"
    addr: ":9200"

data:
  redis:
    network: "tcp"
    addr: "localhost:6379"
    password: ""
  database:
    gateway:
      dsn: "him:him_secret@tcp(localhost:3306)/him?charset=utf8mb4&parseTime=True"
      max_idle_conns: 10
      max_open_conns: 50

otel:
  service_name: "him-gateway"
  endpoint: "localhost:4318"
  sample_rate: 0.1
  path: "/v1/traces"
  timeout: "5s"
  insecure: true
  transport: "http"

user:
  multi_device: true

heartbeat:
  interval_seconds: 10
  timeout_seconds: 180
  sweep_interval: 10

log:
  level: "info"
