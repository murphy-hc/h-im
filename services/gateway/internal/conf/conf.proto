syntax = "proto3";

package him.gateway.conf;

option go_package = "github.com/murphy-hc/h-im/services/gateway/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Log log = 3;
  Otel otel = 4;
}

message Server {
  string env = 1;
  WS ws = 2;
  HTTP http = 3;
  message WS {
    string network = 1;
    string addr = 2;
  }
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
}

message Log { string level = 1; }

message Otel {
  string service_name = 1;
  string endpoint = 2;
  double sample_rate = 3;
  string path = 4;
  google.protobuf.Duration timeout = 5;
  bool insecure = 6;
  string transport = 7;
}
